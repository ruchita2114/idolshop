<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Idol Shop{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:bold;
        }

        .card{
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .product-img{
            height:250px;
            object-fit:cover;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">🪔 Idol Shop</a>

<div>

<a href="/products/" class="btn btn-outline-light me-2">
Products
</a>

<a href="/products/cart/" class="btn btn-warning">
🛒 Cart
</a>

</div>

</div>
</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
